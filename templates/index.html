<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>BioCanvas Nutrition Assistant</title>
		
		<!-- Google Fonts: Outfit -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
		
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
		<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css" integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU" crossorigin="anonymous">
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
		<link rel="stylesheet" type="text/css" href="/static/style.css"/>
	</head>

<body>
	<div class="container-fluid h-100">
		<div class="row justify-content-center h-100">
			<div class="col-md-8 col-xl-6 chat">
				<div class="card">
					<div class="card-header msg_head">
						<div class="d-flex bd-highlight">
							<div class="img_cont">
								<img src="https://cdn-icons-png.flaticon.com/512/387/387569.png"
									class="rounded-circle user_img">
								<!-- <img src="https://www.prdistribution.com/spirit/uploads/pressreleases/2019/newsreleases/d83341deb75c4c4f6b113f27b1e42cd8-chatbot-florence-already-helps-thousands-of-patients-to-remember-their-medication.png" class="rounded-circle user_img"> -->
								<span class="online_icon"></span>
							</div>
							<div class="user_info">
								<span>Medical Chatbot</span>
								<p>Ask me anything!</p>
							</div>
						</div>
					</div>
					<div id="messageFormeight" class="card-body msg_card_body">


					</div>
					<div class="card-footer">
						<form id="messageArea" class="input-group">
							<input type="text" id="text" name="msg" placeholder="Type your message..."
								autocomplete="off" class="form-control type_msg" required />
							<div class="input-group-append">
								<button type="submit" id="send" class="input-group-text send_btn"><i
										class="fas fa-paper-plane"></i></button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

	<script>
		const messageForm = document.getElementById("messageArea");
		const messageContainer = document.getElementById("messageFormeight");

		function getCurrentTime() {
			const now = new Date();
			let hours = now.getHours();
			const minutes = now.getMinutes().toString().padStart(2, "0");
			const ampm = hours >= 12 ? "PM" : "AM";
			hours = hours % 12 || 12;
			return `${hours}:${minutes} ${ampm}`;
		}

		function escapeHtml(str) {
			return String(str)
				.replace(/&/g, "&amp;")
				.replace(/</g, "&lt;")
				.replace(/>/g, "&gt;")
				.replace(/"/g, "&quot;")
				.replace(/'/g, "&#039;");
		}

		function formatMessage(text) {
			return escapeHtml(text).replace(/\n/g, "<br>");
		}

		function buildUserMessage(message, timeStr) {
			return `
        <div class="d-flex justify-content-end mb-4 msg-animate">
          <div class="msg_cotainer_send">
            ${formatMessage(message)}
            <span class="msg_time_send">${timeStr}</span>
          </div>
          <div class="img_cont_msg">
            <img
              src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
              class="rounded-circle user_img_msg"
              alt="User"
            />
          </div>
        </div>
      `;
		}

		function buildSourcesMarkup(sources) {
			if (!sources || !sources.length) return "";

			return `
        <div class="message-meta">
          <button class="refs-toggle-btn" type="button" onclick="toggleRefs(this)">
            References (${sources.length})
          </button>
          <div class="refs-panel" style="display: none;">
            ${sources
					.map(
						(src, index) => `
                <a
                  href="${escapeHtml(src)}"
                  target="_blank"
                  rel="noopener noreferrer"
                  class="ref-link"
                >
                  <span class="ref-index">${index + 1}.</span>
                  <span class="ref-url">${escapeHtml(src)}</span>
                </a>
              `
					)
					.join("")}
          </div>
        </div>
      `;
		}

		function buildBotMessage(message, timeStr, sources = []) {
			return `
        <div class="d-flex justify-content-start mb-4 msg-animate">
          <div class="img_cont_msg">
            <img
              src="https://cdn-icons-png.flaticon.com/512/387/387569.png"
              class="rounded-circle user_img_msg"
              alt="Bot"
            />
          </div>
          <div class="msg_cotainer bot-message">
            <div class="message-text">${formatMessage(message)}</div>
            ${buildSourcesMarkup(sources)}
            <span class="msg_time">${timeStr}</span>
          </div>
        </div>
      `;
		}

		function scrollToBottom() {
			messageContainer.scrollTop = messageContainer.scrollHeight;
		}

		function setSendDisabled(disabled) {
			const sendButton = document.getElementById("send");
			const textInput = document.getElementById("text");
			sendButton.disabled = disabled;
			textInput.disabled = disabled;
		}

		function toggleRefs(button) {
			const panel = button.parentElement.querySelector(".refs-panel");
			const isOpen = panel.style.display === "block";
			panel.style.display = isOpen ? "none" : "block";

			const countMatch = button.textContent.match(/\((\d+)\)/);
			const countText = countMatch ? `(${countMatch[1]})` : "";
			button.textContent = isOpen ? `References ${countText}` : `Hide references ${countText}`;
		}

		async function sendMessage(messageText) {
			const timeStr = getCurrentTime();

			messageContainer.insertAdjacentHTML(
				"beforeend",
				buildUserMessage(messageText, timeStr)
			);
			scrollToBottom();

			setSendDisabled(true);

			try {
				const response = await fetch("/chat", {
					method: "POST",
					headers: {
						"Content-Type": "application/json",
					},
					body: JSON.stringify({
						message: messageText,
						user_id: "demo-user",
						conversation_id: "demo-conversation",
						debug: false,
					}),
				});

				if (!response.ok) {
					throw new Error("Request failed");
				}

				const data = await response.json();

				const answer =
					data.answer ||
					data.final_response ||
					"Sorry, I couldn't generate a response right now.";

				const sources = Array.isArray(data.sources) ? data.sources : [];

				messageContainer.insertAdjacentHTML(
					"beforeend",
					buildBotMessage(answer, getCurrentTime(), sources)
				);
				scrollToBottom();
			} catch (error) {
				messageContainer.insertAdjacentHTML(
					"beforeend",
					buildBotMessage(
						"Sorry, something went wrong while contacting the server.",
						getCurrentTime(),
						[]
					)
				);
				scrollToBottom();
			} finally {
				setSendDisabled(false);
				document.getElementById("text").value = "";
				document.getElementById("text").focus();
			}
		}

		messageForm.addEventListener("submit", async function (event) {
			event.preventDefault();

			const textInput = document.getElementById("text");
			const rawText = textInput.value.trim();

			if (!rawText) return;

			await sendMessage(rawText);
		});
	</script>
</body>

</html>
